name: Deploy to DigitalOcean

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 64.23.168.179
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/myapp
            git pull origin master
            npm install
            pm2 restart myapp || pm2 start index.js --name myapp
            pm2 save